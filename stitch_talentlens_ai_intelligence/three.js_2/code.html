<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_17 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_17" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_17');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const container = document.getElementById('threejs-container');
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Luxury Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0xd4af37, 2);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// Abstract AI "Brain" - Concentric Rings and Nodes
const group = new THREE.Group();

const ringMat = new THREE.MeshPhongMaterial({
    color: 0xd4af37,
    transparent: true,
    opacity: 0.4,
    side: THREE.DoubleSide
});

for (let i = 0; i < 5; i++) {
    const geo = new THREE.TorusGeometry(1.5 + i * 0.3, 0.01, 16, 100);
    const mesh = new THREE.Mesh(geo, ringMat);
    mesh.rotation.x = Math.random() * Math.PI;
    mesh.rotation.y = Math.random() * Math.PI;
    group.add(mesh);
}

// Particle Cloud
const particleGeo = new THREE.SphereGeometry(0.02, 8, 8);
const particleMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
for (let i = 0; i < 100; i++) {
    const particle = new THREE.Mesh(particleGeo, particleMat);
    const r = 2.5;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    particle.position.set(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
    );
    group.add(particle);
}

scene.add(group);
camera.position.z = 6;

function animate() {
    requestAnimationFrame(animate);
    group.rotation.y += 0.003;
    group.rotation.x += 0.001;
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_17 -->
</body>
</html>
